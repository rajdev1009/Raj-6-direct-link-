<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{{.FileName}} — Watch</title>
<style>
  :root {
    --bg: #0a0b10;
    --panel: #12141c;
    --text: #eaeaf0;
    --muted: #8890a6;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
    width: 100%;
  }

  /* ---------- Video: full-bleed on mobile ---------- */
  .video-wrap {
    width: 100%;
    background: #000;
    line-height: 0;
  }
  video {
    width: 100%;
    max-height: 72vh;
    display: block;
    background: #000;
  }

  .page { width: 100%; }

  /* ---------- RGB animated panel below the video ---------- */
  @keyframes rgbMove {
    0%   { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }
  .rgb-border {
    margin: 0 14px 24px;
    padding: 2px;
    border-radius: 20px;
    background: linear-gradient(120deg,
      #ff2d6a, #ff9d2d, #f4ff2d, #2dff8f, #2dd4ff, #8f2dff, #ff2d6a);
    background-size: 300% 300%;
    animation: rgbMove 7s linear infinite;
    box-shadow: 0 15px 45px rgba(0,0,0,0.5);
  }
  .rgb-inner {
    background: var(--panel);
    border-radius: 18px;
    padding: 20px 18px 24px;
  }

  .filename {
    font-size: 15px;
    font-weight: 600;
    word-break: break-word;
    color: var(--text);
    margin: 0 0 2px;
  }
  .sub {
    font-size: 12.5px;
    color: var(--muted);
    margin: 0 0 18px;
  }

  .name-glow {
    display: inline-block;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg,
      #ff2d6a, #ff9d2d, #f4ff2d, #2dff8f, #2dd4ff, #8f2dff, #ff2d6a);
    background-size: 300% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: rgbMove 4s linear infinite;
  }
  .made-by {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 4px 0 18px;
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .btn {
    text-align: center;
    text-decoration: none;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    border: 1px solid rgba(255,255,255,0.08);
    transition: transform 0.15s ease, opacity 0.15s ease;
    cursor: pointer;
    user-select: none;
    color: #0a0b10;
  }
  .btn:active { transform: scale(0.97); }
  .btn-stream {
    background: linear-gradient(120deg, #2dd4ff, #2d8fff);
  }
  .btn-playit {
    background: linear-gradient(120deg, #8f2dff, #ff2d6a);
    color: #fff;
  }
  .btn-vlc {
    background: linear-gradient(120deg, #ff9d2d, #ff5e2d);
  }
  .btn-download {
    background: linear-gradient(120deg, #2dff8f, #2dd4a0);
  }
  .btn:hover { opacity: 0.9; }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 11.5px;
    letter-spacing: 0.5px;
    padding: 8px 16px 32px;
  }
  footer .glow {
    color: #7aa2f7;
    font-weight: 600;
  }

  /* ---------- Desktop / tablet: contained card look ---------- */
  @media (min-width: 700px) {
    body {
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }
    .page { max-width: 720px; }
    .video-wrap {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      margin-bottom: 20px;
    }
    video { max-height: 65vh; }
    .rgb-border { margin: 0 0 20px; }
    .actions { flex-direction: row; flex-wrap: wrap; }
    .btn { flex: 1 1 150px; }
  }
</style>
</head>
<body>
  <div class="page">
    <div class="video-wrap">
      <video id="player" controls autoplay playsinline preload="metadata">
        <source src="{{.StreamURL}}">
        Your browser does not support the video tag.
      </video>
    </div>

    <div class="rgb-border">
      <div class="rgb-inner">
        <div class="filename">{{.FileName}}</div>
        <div class="sub">Streaming directly — no download required</div>

        <div style="text-align:center">
          <span class="name-glow">Raj Dev J</span>
        </div>
        <div class="made-by">⚡ RAJ File Stream Bot</div>

        <div class="actions">
          <a class="btn btn-stream" href="{{.StreamURL}}">🔗 Stream</a>
          <a class="btn btn-playit" href="{{.PlayItURL}}">▶️ Open in PlayIt</a>
          <a class="btn btn-vlc" href="{{.VlcURL}}">🎬 Open in VLC</a>
          <a class="btn btn-download" href="{{.DownloadURL}}">⬇️ Download</a>
        </div>
      </div>
    </div>

    <footer>
      Powered by <span class="glow">AstraToonix Stream Engine</span>
    </footer>
  </div>
</body>
</html>
