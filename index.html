<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{{.FileName}} — Watch</title>

<!-- Open Graph / share preview -->
<meta property="og:title" content="{{.FileName}}">
<meta property="og:type" content="video.other">
<meta property="og:video" content="{{.StreamURL}}">
<meta property="og:video:type" content="{{.MimeType}}">
<meta property="og:description" content="Watch {{.FileName}} — streamed via RAJ File Stream Bot">
<meta name="twitter:card" content="player">

<style>
  :root {
    --bg: #0a0b10;
    --panel: #12141c;
    --chip: #1a1d28;
    --text: #eaeaf0;
    --muted: #8890a6;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
    width: 100%;
  }

  /* ---------- Video: full-bleed on mobile ---------- */
  .video-wrap {
    position: relative;
    width: 100%;
    background: #000;
    line-height: 0;
  }
  video {
    width: 100%;
    max-height: 72vh;
    display: block;
    background: #000;
  }

  /* Loading spinner overlay */
  .loader {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.55);
    transition: opacity 0.25s ease;
    pointer-events: none;
  }
  .loader.hidden { opacity: 0; }
  .spinner {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: #7aa2f7;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .page { width: 100%; }

  /* ---------- Mini toolbar under the video ---------- */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 10px 14px;
    font-size: 12.5px;
    color: var(--muted);
  }
  .toolbar .left { display: flex; gap: 6px; }
  .chip {
    background: var(--chip);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
  }
  .chip:active { transform: scale(0.95); }

  /* ---------- RGB animated panel below the video ---------- */
  @keyframes rgbMove {
    0%   { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }
  .rgb-border {
    margin: 0 14px 16px;
    padding: 2px;
    border-radius: 20px;
    background: linear-gradient(120deg,
      #ff2d6a, #ff9d2d, #f4ff2d, #2dff8f, #2dd4ff, #8f2dff, #ff2d6a);
    background-size: 300% 300%;
    animation: rgbMove 7s linear infinite;
    box-shadow: 0 15px 45px rgba(0,0,0,0.5);
  }
  .rgb-inner {
    background: var(--panel);
    border-radius: 18px;
    padding: 20px 18px 24px;
  }

  .filename {
    font-size: 15px;
    font-weight: 600;
    word-break: break-word;
    color: var(--text);
    margin: 0 0 2px;
  }
  .sub {
    font-size: 12.5px;
    color: var(--muted);
    margin: 0 0 18px;
  }

  .name-glow {
    display: inline-block;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg,
      #ff2d6a, #ff9d2d, #f4ff2d, #2dff8f, #2dd4ff, #8f2dff, #ff2d6a);
    background-size: 300% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: rgbMove 4s linear infinite;
  }
  .made-by {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 4px 0 18px;
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .btn {
    text-align: center;
    text-decoration: none;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    border: 1px solid rgba(255,255,255,0.08);
    transition: transform 0.15s ease, opacity 0.15s ease;
    cursor: pointer;
    user-select: none;
    color: #0a0b10;
  }
  .btn:active { transform: scale(0.97); }
  .btn-stream { background: linear-gradient(120deg, #2dd4ff, #2d8fff); }
  .btn-playit { background: linear-gradient(120deg, #8f2dff, #ff2d6a); color: #fff; }
  .btn-vlc    { background: linear-gradient(120deg, #ff9d2d, #ff5e2d); }
  .btn-download { background: linear-gradient(120deg, #2dff8f, #2dd4a0); }
  .btn:hover { opacity: 0.9; }

  /* ---------- Copy / Share row ---------- */
  .util-row {
    display: flex;
    gap: 10px;
    margin: 0 14px 8px;
  }
  .util-btn {
    flex: 1;
    text-align: center;
    background: transparent;
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
  }
  .util-btn:active { transform: scale(0.97); }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%) translateY(20px);
    background: #1d212e;
    color: #eaeaf0;
    border: 1px solid rgba(122,162,247,0.4);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 50;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 11.5px;
    letter-spacing: 0.5px;
    padding: 8px 16px 32px;
  }
  footer .glow { color: #7aa2f7; font-weight: 600; }

  /* ---------- Desktop / tablet: contained card look ---------- */
  @media (min-width: 700px) {
    body { display: flex; justify-content: center; padding: 32px 16px; }
    .page { max-width: 720px; }
    .video-wrap {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    video { max-height: 65vh; }
    .rgb-border { margin: 0 0 16px; }
    .util-row { margin: 0 0 8px; }
    .actions { flex-direction: row; flex-wrap: wrap; }
    .btn { flex: 1 1 150px; }
  }

  @media (max-width: 480px) {
    .actions { flex-direction: column; }
  }
</style>
</head>
<body>
  <div class="page">
    <div class="video-wrap">
      <div class="loader" id="loader"><div class="spinner"></div></div>
      <video id="player" controls autoplay playsinline preload="metadata">
        <source src="{{.StreamURL}}" type="{{.MimeType}}">
        Your browser does not support the video tag.
      </video>
    </div>

    <div class="toolbar">
      <div class="left">
        <button class="chip" id="btnSpeed">1x</button>
        <button class="chip" id="btnPiP">PiP</button>
      </div>
      <div id="metaInfo">{{.FileSize}}</div>
    </div>

    <div class="rgb-border">
      <div class="rgb-inner">
        <div class="filename">{{.FileName}}</div>
        <div class="sub">Streaming directly — no download required</div>

        <div style="text-align:center">
          <span class="name-glow">Raj Dev J</span>
        </div>
        <div class="made-by">⚡ RAJ File Stream Bot</div>

        <div class="actions">
          <a class="btn btn-stream" href="{{.StreamURL}}">🔗 Stream</a>
          <a class="btn btn-playit" href="{{.PlayItURL}}">▶️ Open in PlayIt</a>
          <a class="btn btn-vlc" href="{{.VlcURL}}">🎬 Open in VLC</a>
          <a class="btn btn-download" href="{{.DownloadURL}}">⬇️ Download</a>
        </div>
      </div>
    </div>

    <div class="util-row">
      <button class="util-btn" id="btnCopy">🔗 Copy Link</button>
      <button class="util-btn" id="btnShare">📤 Share</button>
    </div>

    <footer>
      Powered by <span class="glow">AstraToonix Stream Engine</span>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const video   = document.getElementById('player');
  const loader  = document.getElementById('loader');
  const meta    = document.getElementById('metaInfo');
  const toast   = document.getElementById('toast');
  const baseSize = "{{.FileSize}}";

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // ---- Loading spinner ----
  video.addEventListener('waiting', () => loader.classList.remove('hidden'));
  video.addEventListener('playing', () => loader.classList.add('hidden'));
  video.addEventListener('canplay', () => loader.classList.add('hidden'));
  video.addEventListener('error', () => {
    loader.classList.add('hidden');
    showToast('⚠️ Playback error — try Download instead');
  });

  // ---- Duration + size info ----
  video.addEventListener('loadedmetadata', () => {
    if (isFinite(video.duration) && video.duration > 0) {
      const m = Math.floor(video.duration / 60);
      const s = Math.floor(video.duration % 60).toString().padStart(2, '0');
      meta.textContent = baseSize ? (baseSize + ' • ' + m + ':' + s) : (m + ':' + s);
    }
  });

  // ---- Playback speed cycle ----
  const speeds = [1, 1.25, 1.5, 2, 0.5];
  let speedIdx = 0;
  document.getElementById('btnSpeed').addEventListener('click', (e) => {
    speedIdx = (speedIdx + 1) % speeds.length;
    video.playbackRate = speeds[speedIdx];
    e.target.textContent = speeds[speedIdx] + 'x';
  });

  // ---- Picture-in-Picture ----
  const pipBtn = document.getElementById('btnPiP');
  if (!document.pictureInPictureEnabled) {
    pipBtn.style.display = 'none';
  } else {
    pipBtn.addEventListener('click', async () => {
      try {
        if (document.pictureInPictureElement) {
          await document.exitPictureInPicture();
        } else {
          await video.requestPictureInPicture();
        }
      } catch (err) {
        showToast('PiP not supported here');
      }
    });
  }

  // ---- Copy link ----
  document.getElementById('btnCopy').addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(window.location.href);
      showToast('✅ Link copied!');
    } catch (err) {
      const ta = document.createElement('textarea');
      ta.value = window.location.href;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('✅ Link copied!');
    }
  });

  // ---- Share ----
  document.getElementById('btnShare').addEventListener('click', async () => {
    const shareData = {
      title: "{{.FileName}}",
      text: 'Watch this on RAJ File Stream',
      url: window.location.href
    };
    if (navigator.share) {
      try { await navigator.share(shareData); }
      catch (err) { /* user cancelled — no-op */ }
    } else {
      await navigator.clipboard.writeText(window.location.href).catch(() => {});
      showToast('Link copied — sharing not supported here');
    }
  });
</script>
</body>
</html>
